<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Sawah - SIPANDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#5ca904', secondary: '#4d8e03' } }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; transition: background-color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(92, 169, 4, 0.1); }
        .sensor-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(92, 169, 4, 0.1); border-color: rgba(92, 169, 4, 0.4); }
    </style>
</head>
<body class="min-h-screen pb-32 text-slate-800">

    <!-- Header Section -->
    <header class="p-6 flex items-center justify-between animate__animated animate__fadeInDown bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <button onclick="window.location.href='/devices'" class="p-3 bg-white border border-slate-200 rounded-2xl hover:bg-primary hover:text-white transition-all group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <div class="text-center">
            <h1 id="device-name" class="text-lg font-black tracking-tight text-slate-900 uppercase">UNIT MONITORING</h1>
            <p id="device-id" class="text-[10px] text-primary font-black tracking-[0.2em] uppercase">ID: {{ device_id }}</p>
        </div>
        <div class="w-12"></div>
    </header>

    <main class="p-6 max-w-4xl mx-auto space-y-8 mt-4">
        
        <!-- STATUS HAMA - SEKSI UTAMA -->
        <section class="glass p-10 rounded-[3rem] relative overflow-hidden animate__animated animate__bounceIn shadow-xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400 flex items-center gap-3">
                    <span class="p-2 bg-primary/10 rounded-xl">🦟</span> Radar Hama
                </h2>
                <span id="hama-alert" class="px-4 py-1.5 bg-primary/10 text-primary text-[10px] font-black rounded-full uppercase tracking-widest border border-primary/20">Aman</span>
            </div>
            
            <div class="text-center py-8">
                <div id="hama-status" class="text-6xl font-black text-slate-900 mb-4">TIDAK ADA</div>
                <p id="hama-dist" class="text-slate-400 text-xs font-bold tracking-widest uppercase italic">Jarak: -- cm</p>
            </div>
            
            <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
        </section>

        <!-- GRID SENSOR -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Suhu Udara -->
            <article class="sensor-card glass p-8 rounded-[2.5rem] animate__animated animate__fadeInLeft" style="animation-delay: 0.1s; transition: all 0.3s;">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-6">Suhu Udara</p>
                <div class="flex items-baseline gap-2 mb-4">
                    <span id="suhu-val" class="text-5xl font-black text-slate-900">--</span>
                    <span class="text-xl font-bold text-primary italic">°C</span>
                </div>
                <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="suhu-bar" class="h-full bg-primary transition-all duration-1000" style="width: 0%"></div>
                </div>
            </article>

            <!-- Kelembapan Udara -->
            <article class="sensor-card glass p-8 rounded-[2.5rem] animate__animated animate__fadeInLeft" style="animation-delay: 0.2s; transition: all 0.3s;">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-6">Lembab Udara</p>
                <div class="flex items-baseline gap-2 mb-4">
                    <span id="humi-val" class="text-5xl font-black text-slate-900">--</span>
                    <span class="text-xl font-bold text-primary italic">%</span>
                </div>
                <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="humi-bar" class="h-full bg-primary transition-all duration-1000" style="width: 0%"></div>
                </div>
            </article>

            <!-- Kelembapan Tanah -->
            <article class="sensor-card glass p-8 rounded-[2.5rem] animate__animated animate__fadeInLeft" style="animation-delay: 0.3s; transition: all 0.3s;">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-6">Kadar Air Tanah</p>
                <div class="flex items-baseline gap-2 mb-4">
                    <span id="soil-val" class="text-5xl font-black text-slate-900">--</span>
                    <span class="text-xl font-bold text-primary italic">%</span>
                </div>
                <p id="soil-desc" class="text-[10px] font-black text-primary uppercase tracking-widest">Mendeteksi...</p>
            </article>
        </div>

        <!-- KONTROL MANUAL -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Servo 1: Lonceng -->
            <div class="glass p-10 rounded-[3rem] animate__animated animate__fadeInUp shadow-lg" style="animation-delay: 0.4s;">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400 mb-8 flex items-center gap-3">
                    <span class="p-2 bg-primary/10 rounded-xl text-primary">🔔</span> Suara Kejut
                </h3>
                <button id="btn-ring" onclick="triggerServo1()" 
                    class="w-full py-6 bg-primary text-white font-black rounded-3xl shadow-xl shadow-primary/20 hover:scale-[1.03] active:scale-95 transition-all text-sm tracking-widest uppercase">
                    BUNYIKAN LONCENG
                </button>
            </div>

            <!-- Servo 2: Sudut Pantau -->
            <div class="glass p-10 rounded-[3rem] animate__animated animate__fadeInUp shadow-lg" style="animation-delay: 0.5s;">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400 mb-8 flex items-center gap-3">
                    <span class="p-2 bg-primary/10 rounded-xl text-primary">🔄</span> Putar Radar
                </h3>
                <input type="range" id="servo2-slider" min="0" max="180" value="90" 
                    oninput="updateServo2(this.value)"
                    class="w-full h-2.5 bg-slate-100 rounded-full appearance-none cursor-pointer accent-primary">
                <div class="flex justify-between mt-6 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                    <span>Kiri</span>
                    <span id="angle-val" class="text-primary text-xs">90°</span>
                    <span>Kanan</span>
                </div>
            </div>
        </section>

    </main>

    <!-- Firebase SDK Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d",
            storageBucket: "sipandi-3d71d.firebasestorage.app",
            messagingSenderId: "133803656199",
            appId: "1:133803656199:web:51e5759ffd02a102a796a2",
            measurementId: "G-Y5CFE0EZ29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const fs = getFirestore(app);
        const currentDeviceId = "{{ device_id }}";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/auth";
                return;
            }
            try {
                const deviceDoc = await getDoc(doc(fs, `/users/${user.uid}/devices`, currentDeviceId));
                if (deviceDoc.exists()) {
                    document.getElementById('device-name').innerText = deviceDoc.data().name.toUpperCase();
                }
            } catch(e) {}
            initializeRealtimeData();
        });

        function initializeRealtimeData() {
            onValue(ref(db, `devices/${currentDeviceId}/sensors`), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.suhu) {
                        document.getElementById('suhu-val').innerText = data.suhu;
                        document.getElementById('suhu-bar').style.width = `${Math.min(100, data.suhu * 2)}%`;
                    }
                    if (data.humidity) {
                        document.getElementById('humi-val').innerText = data.humidity;
                        document.getElementById('humi-bar').style.width = `${data.humidity}%`;
                    }
                    if (data.soil) {
                        const soil = data.soil;
                        document.getElementById('soil-val').innerText = soil;
                        const desc = document.getElementById('soil-desc');
                        if (soil < 30) { desc.innerText = "Tanah Kering"; }
                        else if (soil > 80) { desc.innerText = "Tanah Basah"; }
                        else { desc.innerText = "Kondisi Ideal"; }
                    }
                }
            });

            onValue(ref(db, `devices/${currentDeviceId}/hama`), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const dist = data.distance || 0;
                    document.getElementById('hama-dist').innerText = `Jarak deteksi: ${dist} cm`;
                    const statusEl = document.getElementById('hama-status');
                    const alertEl = document.getElementById('hama-alert');
                    if (dist > 0 && dist < 30) {
                        statusEl.innerText = "🔴 WASPADA";
                        statusEl.classList.add('animate__shakeX');
                        alertEl.innerText = "HAMA DEKAT";
                        alertEl.className = "px-4 py-1.5 bg-red-500/10 text-red-500 text-[10px] font-black rounded-full uppercase tracking-widest border border-red-500/20";
                    } else {
                        statusEl.innerText = "TIDAK ADA";
                        statusEl.classList.remove('animate__shakeX');
                        alertEl.innerText = "AMAN";
                        alertEl.className = "px-4 py-1.5 bg-primary/10 text-primary text-[10px] font-black rounded-full uppercase tracking-widest border border-primary/20";
                    }
                }
            });
        }

        window.triggerServo1 = () => {
            set(ref(db, `devices/${currentDeviceId}/commands/servo1`), { action: 'ring', timestamp: Date.now() });
            const btn = document.getElementById('btn-ring');
            btn.innerText = "🔔 SEDANG MENDERING...";
            setTimeout(() => btn.innerText = "BUNYIKAN LONCENG", 2000);
        };

        window.updateServo2 = (val) => {
            document.getElementById('angle-val').innerText = `${val}°`;
            set(ref(db, `devices/${currentDeviceId}/commands/servo2_angle`), parseInt(val));
        };
    </script>
</body>
</html>
 Riverside, CA
