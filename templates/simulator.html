<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPANDI - IoT Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.5rem;
            padding: 2rem;
        }

        input[type=range] {
            width: 100%;
            accent-color: #5ca904;
        }

        .ringing {
            animation: shake 0.2s infinite;
            color: #fbbf24;
            border-color: #fbbf24 !important;
            background: rgba(251, 191, 36, 0.1) !important;
        }

        @keyframes shake {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(15deg);
            }

            50% {
                transform: rotate(0deg);
            }

            75% {
                transform: rotate(-15deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }
    </style>
</head>

<body class="p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-6 text-slate-100">
        <div class="text-center">
            <h1 class="text-3xl font-black text-[#5ca904] tracking-tighter">SIPANDI SIMULATOR</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Uji Coba Software Tanpa Alat
                IoT</p>
        </div>

        <!-- BELL VISUAL INDICATOR -->
        <div id="bell-indicator"
            class="flex flex-col items-center justify-center p-6 bg-slate-900 rounded-[2.5rem] border-2 border-slate-800 transition-all duration-300">
            <span id="bell-icon" class="text-5xl transition-all duration-300 transform">🔔</span>
            <p id="bell-status" class="text-[10px] font-black uppercase tracking-[0.3em] mt-4 text-slate-600">Lonceng
                Siaga</p>
        </div>

        <div class="card space-y-6 shadow-2xl">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Device ID
                    Target</label>
                <input id="target-id" type="text" value="ALAT-01" placeholder="Masukkan ID Alat"
                    class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-[#5ca904] font-black focus:border-[#5ca904] outline-none transition-all">
            </div>

            <hr class="border-slate-800">

            <!-- Sensor Suhu -->
            <div>
                <div class="flex justify-between mb-3">
                    <span class="text-xs font-black uppercase text-slate-400">Suhu Udara</span>
                    <span id="suhu-val" class="text-[#5ca904] font-black">25°C</span>
                </div>
                <input type="range" id="suhu-range" min="10" max="50" value="25" oninput="updateValues()"
                    class="cursor-pointer">
            </div>

            <!-- Sensor Kelembaban -->
            <div>
                <div class="flex justify-between mb-3">
                    <span class="text-xs font-black uppercase text-slate-400">Kelembaban</span>
                    <span id="humi-val" class="text-[#5ca904] font-black">70%</span>
                </div>
                <input type="range" id="humi-range" min="0" max="100" value="70" oninput="updateValues()"
                    class="cursor-pointer">
            </div>

            <!-- Sensor Tanah -->
            <div>
                <div class="flex justify-between mb-3">
                    <span class="text-xs font-black uppercase text-slate-400">Kadar Air Tanah</span>
                    <span id="soil-val" class="text-[#5ca904] font-black">50%</span>
                </div>
                <input type="range" id="soil-range" min="0" max="100" value="50" oninput="updateValues()"
                    class="cursor-pointer">
            </div>

            <!-- Jarak Hama -->
            <div class="p-6 bg-red-500/5 border border-red-500/20 rounded-[1.5rem]">
                <div class="flex justify-between mb-3">
                    <span class="text-xs font-black uppercase text-red-400">Jarak Hama (Radar)</span>
                    <span id="hama-val" class="text-red-500 font-black">100 cm</span>
                </div>
                <input type="range" id="hama-range" min="0" max="150" value="100" oninput="updateValues()"
                    class="cursor-pointer accent-red-500">
                <p class="text-[9px] text-red-400/50 mt-4 italic text-center font-bold uppercase tracking-tighter">
                    Status: <span id="hama-status-text" class="text-slate-400 tracking-normal">Aman</span>
                    (Batas: <span id="thresh-display">30</span>cm)
                </p>
            </div>

            <div class="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-700">
                <span class="text-xs font-black uppercase text-slate-400">Mode Auto-Kirim</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="auto-send" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#5ca904]">
                    </div>
                </label>
            </div>

            <button id="btn-push"
                class="w-full py-5 bg-[#5ca904] text-white font-black rounded-2xl shadow-xl shadow-[#5ca904]/20 hover:scale-[1.02] active:scale-95 transition-all text-sm uppercase tracking-widest">
                KIRIM DATA SEKARANG
            </button>

            <button id="btn-mock-history"
                class="w-full py-4 border-2 border-[#5ca904] text-[#5ca904] font-black rounded-2xl hover:bg-[#5ca904] hover:text-white transition-all text-[10px] uppercase tracking-[0.2em]">
                🧬 SIMULASI RIWAYAT 7 HARI
            </button>
            <p id="status" class="text-center text-[9px] text-slate-600 uppercase font-black tracking-widest mt-2"></p>
        </div>

        <p class="text-center text-slate-700 text-[8px] font-black uppercase tracking-[0.3em]">SIPANDI v2.1 Simulator
            Tool</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
         import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.updateValues = () => {
            document.getElementById('suhu-val').innerText = document.getElementById('suhu-range').value + "°C";
            document.getElementById('humi-val').innerText = document.getElementById('humi-range').value + "%";
            document.getElementById('soil-val').innerText = document.getElementById('soil-range').value + "%";
            document.getElementById('hama-val').innerText = document.getElementById('hama-range').value + " cm";
        };
         async function sendData() {
             const deviceId = document.getElementById('target-id').value;
             const status = document.getElementById('status');

             if (!deviceId || deviceId.trim() === "") {
                 status.innerText = "⚠️ Masukkan ID Alat dulu!";
                 status.className = "text-center text-red-500 font-bold mb-4";
                 return;
             }

             const cleanId = deviceId.trim().toUpperCase();
             
             if (document.getElementById('auto-send').checked) {
                 const suhuEl = document.getElementById('suhu-range');
                 const humiEl = document.getElementById('humi-range');
                 suhuEl.value = (parseFloat(suhuEl.value) + (Math.random() * 0.4 - 0.2)).toFixed(1);
                 humiEl.value = Math.max(0, Math.min(100, parseInt(humiEl.value) + (Math.floor(Math.random() * 3) - 1)));
                 updateValues();
             }

            const suhu = document.getElementById('suhu-range').value;
            const humi = document.getElementById('humi-range').value;
            const soil = document.getElementById('soil-range').value;
            const dist = document.getElementById('hama-range').value;

            const data = {
                sensors: {
                    suhu: parseFloat(suhu),
                    humidity: parseFloat(humi),
                    soil: parseFloat(soil)
                },
                hama: {
                    distance: parseInt(dist)
                },
                 last_seen: serverTimestamp()
             };

            try {
                // Gunakan update atau set ke path spesifik agar tidak menghapus settings/commands
                await set(ref(db, `devices/${deviceId}/sensors`), data.sensors);
                await set(ref(db, `devices/${deviceId}/hama`), data.hama);
                await set(ref(db, `devices/${deviceId}/last_seen`), data.last_seen);

                if (!document.getElementById('auto-send').checked) {
                    status.innerText = "✓ BERHASIL TERKIRIM!";
                    status.className = "text-center text-[9px] text-[#5ca904] uppercase font-black tracking-widest mt-2";
                    setTimeout(() => status.innerText = "", 2000);
                } else {
                    status.innerText = "⚡ REAL-TIME STREAMING (0.5 DETIK)";
                    status.className = "text-center text-[9px] text-[#5ca904] animate-pulse uppercase font-black tracking-widest mt-2";
                }
            } catch (e) {
                status.innerText = "⚠ GAGAL: " + e.message;
                status.className = "text-center text-[9px] text-red-500 uppercase font-black tracking-widest mt-2";
            }
        };

        // Audio Context untuk bunyi beep
        let audioCtx = null;
        let beepInterval = null;

        function playBeep() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "square";
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        window.triggerVisualBell = (reason, isAuto = false) => {
            const bellBox = document.getElementById('bell-indicator');
            const bellStatus = document.getElementById('bell-status');

            bellBox.classList.add('ringing');
            bellStatus.innerText = reason;
            bellStatus.classList.add('text-yellow-500');

            // Mulai bunyi beep jika belum ada
            if (!beepInterval) {
                playBeep();
                beepInterval = setInterval(playBeep, 300);
            }

            // Hapus otomatis hanya jika ini pemicu manual (Dashboard)
            if (!isAuto) {
                setTimeout(() => {
                    const dist = parseFloat(document.getElementById('hama-range').value);
                    if (!(dist > 0 && dist < currentThresh)) {
                        stopBell();
                    }
                }, 3000);
            }
        };

        function stopBell() {
            const bellBox = document.getElementById('bell-indicator');
            const bellStatus = document.getElementById('bell-status');

            bellBox.classList.remove('ringing');
            bellStatus.innerText = "Lonceng Siaga";
            bellStatus.classList.remove('text-yellow-500');

            if (beepInterval) {
                clearInterval(beepInterval);
                beepInterval = null;
            }
        }

        const generateMockHistory = async () => {
            const deviceId = document.getElementById('target-id').value;
            const status = document.getElementById('status');
            status.innerText = "⚡ GENERATING MOCK HISTORY (7 DAYS)...";

            const now = Date.now();
            const dayMs = 24 * 60 * 60 * 1000;
            const hourMs = 60 * 60 * 1000;

            try {
                for (let d = 0; d < 7; d++) {
                    // Generate 4 snapshots per day (every 6 hours)
                    for (let h = 0; h < 24; h += 6) {
                        const time = now - (d * dayMs) - (h * hourMs);
                        const data = {
                            suhu: (22 + Math.random() * 8).toFixed(1),
                            humidity: (60 + Math.random() * 30).toFixed(0),
                            soil: (40 + Math.random() * 40).toFixed(0),
                            hama_detected: Math.random() > 0.8 // 20% chance of pest
                        };
                        await set(ref(db, `devices/${deviceId}/history/${time}`), data);
                    }
                }
                status.innerText = "✓ RIWAYAT 7 HARI BERHASIL DIBUAT!";
                setTimeout(() => status.innerText = "", 3000);
            } catch (e) {
                status.innerText = "⚠ GAGAL MOCK: " + e.message;
            }
        };

        document.getElementById('btn-mock-history').addEventListener('click', generateMockHistory);
        document.getElementById('btn-push').addEventListener('click', pushData);

        // Monitoring Perintah & Settings dari Dashboard (Lonceng, Radar, Threshold)
        import { onValue, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        let currentThresh = 30;
        let currentListeners = [];

        function setupListeners() {
            const deviceId = document.getElementById('target-id').value;

            // Bersihkan listener lama
            currentListeners.forEach(l => off(l));
            currentListeners = [];

            // Listener Threshold
            const threshRef = ref(db, `devices/${deviceId}/settings/hama_threshold`);
            onValue(threshRef, (snapshot) => {
                const val = snapshot.val();
                if (val !== null) {
                    currentThresh = Number(val);
                    document.getElementById('thresh-display').innerText = val;
                    if (window.checkHamaStatus) window.checkHamaStatus();
                }
            });
            currentListeners.push(threshRef);

            // Listener Commands
            const cmdRef = ref(db, `devices/${deviceId}/commands`);
            onValue(cmdRef, (snapshot) => {
                const cmds = snapshot.val();
                if (cmds) {
                    if (cmds.servo1) {
                        triggerVisualBell("DASHBOARD: LONCENG MANUAL!");
                    }
                    if (cmds.servo2_angle) {
                        console.log("Radar Berputar ke: " + cmds.servo2_angle + "°");
                    }
                }
            });
            currentListeners.push(cmdRef);
        }

        window.checkHamaStatus = () => {
            const dist = parseFloat(document.getElementById('hama-range').value);
            const statusText = document.getElementById('hama-status-text');
            const bellBox = document.getElementById('bell-indicator');
            const bellStatus = document.getElementById('bell-status');

            if (dist > 0 && dist < currentThresh) {
                statusText.innerText = "HAMA TERDETEKSI!";
                statusText.className = "text-red-500 font-black tracking-normal animate-pulse";
                triggerVisualBell("OTOMATIS: HAMA DEKAT!", true);
            } else {
                statusText.innerText = "Aman";
                statusText.className = "text-slate-400 tracking-normal";

                // Berhenti jika sudah tidak ada hama dan bukan sedang manual trigger
                if (bellStatus && bellStatus.innerText.includes("OTOMATIS")) {
                    stopBell();
                }
            }
        };

        // Panggil setiap ada perubahan nilai (slider digeser)
        window.updateValues = () => {
            document.getElementById('suhu-val').innerText = document.getElementById('suhu-range').value + "°C";
            document.getElementById('humi-val').innerText = document.getElementById('humi-range').value + "%";
            document.getElementById('soil-val').innerText = document.getElementById('soil-range').value + "%";
            document.getElementById('hama-val').innerText = document.getElementById('hama-range').value + " cm";
            window.checkHamaStatus();
        };

        setInterval(() => {
            if (document.getElementById('auto-send').checked) {
                pushData();
            }
        }, 500);

        // Inisialisasi awal
        setupListeners();
        document.getElementById('target-id').addEventListener('change', setupListeners);
    </script>
</body>

</html>
