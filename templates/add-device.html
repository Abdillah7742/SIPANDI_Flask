<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Alat - SIPANDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { primary: '#5ca904', secondary: '#4d8e03' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(92, 169, 4, 0.1); }
        #reader { border-radius: 2.5rem; overflow: hidden; border: 6px solid #5ca904 !important; min-height: 250px; background: #000; }
        #reader video { object-fit: cover !important; }
        .mirrored video { transform: scaleX(-1); }
    </style>
</head>

<body class="min-h-screen text-slate-800 p-6 flex flex-col items-center">

    <header class="w-full max-w-md flex items-center justify-between mb-8 animate__animated animate__fadeInDown">
        <button onclick="history.back()"
            class="p-3 bg-white border border-slate-200 rounded-2xl hover:bg-primary hover:text-white transition-all group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:-translate-x-1" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h1 class="text-xl font-black uppercase tracking-tight text-primary">TAMBAH ALAT</h1>
        <div class="w-12"></div>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div class="glass p-8 rounded-[3rem] shadow-2xl relative animate__animated animate__zoomIn">
            <p class="text-center text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-8 px-4 leading-relaxed opacity-60">
                Arahkan kamera ke QR Code<br>pada unit SIPANDI</p>

            <div id="reader-wrapper" class="relative mb-6">
                <div id="reader" class="w-full shadow-2xl shadow-primary/20"></div>
            </div>

            <!-- New Camera Controls Layout -->
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button id="btn-switch-cam" class="flex items-center justify-center gap-2 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Putar Kamera
                </button>
                <button id="btn-mirror" class="flex items-center justify-center gap-2 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                    </svg>
                    Balik Layar
                </button>
            </div>

            <div class="pt-2">
                <input type="file" id="qr-input-file" accept="image/*" class="hidden">
                <button id="btn-upload-file"
                    class="w-full py-5 bg-primary/10 text-primary border border-primary/20 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:bg-primary/20 transition-all flex items-center justify-center gap-3">
                    📁 UPLOAD GAMBAR QR
                </button>
            </div>
        </div>
    </main>

    <!-- CUSTOM PREMIUM MODAL (Glassmorphism) -->
    <div id="modal-container" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate__animated animate__fadeIn">
        <div class="glass p-10 rounded-[3rem] shadow-2xl max-w-sm w-full animate__animated animate__bounceIn">
            <div class="text-center">
                <div id="modal-icon" class="text-5xl mb-6">⚠️</div>
                <h3 id="modal-title" class="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tight text-balance">Memproses...</h3>
                <p id="modal-message" class="text-slate-500 font-medium leading-relaxed mb-10 text-sm">Sedang melakukan validasi data.</p>
                <div id="modal-buttons" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d",
            storageBucket: "sipandi-3d71d.firebasestorage.app",
            messagingSenderId: "133803656199",
            appId: "1:133803656199:web:51e5759ffd02a102a796a2",
            measurementId: "G-Y5CFE0EZ29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const modalContainer = document.getElementById('modal-container');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalIcon = document.getElementById('modal-icon');
        const modalButtons = document.getElementById('modal-buttons');

        let currentUser = null;
        let html5QrCode = null;
        let currentFacingMode = "environment";

        window.showSipandiModal = ({ title, message, icon, confirmText, onConfirm, showLoading }) => {
            modalTitle.innerText = title;
            modalMessage.innerText = message;
            modalIcon.innerText = icon || '⚠️';
            modalButtons.innerHTML = '';

            if (showLoading) modalIcon.classList.add('animate-pulse');
            else modalIcon.classList.remove('animate-pulse');

            if (confirmText) {
                const btn = document.createElement('button');
                btn.className = "w-full py-5 bg-primary text-white font-black rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all text-xs tracking-widest uppercase";
                btn.innerText = confirmText;
                btn.onclick = () => {
                    closeSipandiModal();
                    if (onConfirm) onConfirm();
                };
                modalButtons.appendChild(btn);
            }
            modalContainer.classList.remove('hidden', 'animate__fadeOut');
            modalContainer.classList.add('animate__fadeIn');
        };

        window.closeSipandiModal = () => {
            modalContainer.classList.add('animate__fadeOut');
            setTimeout(() => modalContainer.classList.add('hidden'), 500);
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "/auth";
            else {
                currentUser = user;
                startCamera(currentFacingMode);
            }
        });

        async function startCamera(facingMode) {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            if (html5QrCode.isScanning) {
                try { await html5QrCode.stop(); } catch(e) {}
            }
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };
            try {
                await html5QrCode.start({ facingMode: facingMode }, config, async (decodedText) => {
                    await handleScanResult(decodedText);
                });
            } catch (err) {
                console.warn("Camera check:", err);
            }
        }

        async function handleScanResult(decodedText) {
            if (html5QrCode && html5QrCode.isScanning) {
                try { await html5QrCode.stop(); } catch(e) {}
            }
            processResult(decodedText);
        }

        document.getElementById('btn-switch-cam').onclick = async () => {
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
            await startCamera(currentFacingMode);
        };

        document.getElementById('btn-mirror').onclick = () => {
            document.getElementById('reader').classList.toggle('mirrored');
        };

        document.getElementById('btn-upload-file').onclick = () => document.getElementById('qr-input-file').click();
        document.getElementById('qr-input-file').onchange = async (e) => {
            if (e.target.files.length == 0) return;
            const file = e.target.files[0];
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            if (html5QrCode.isScanning) {
                try { await html5QrCode.stop(); } catch(e) {}
            }
            showSipandiModal({ title: 'MEMBACA...', message: 'Menganalisis gambar QR Code.', icon: '📷', showLoading: true });
            try {
                const decodedText = await html5QrCode.scanFile(file, true);
                closeSipandiModal();
                processResult(decodedText);
            } catch (err) {
                showSipandiModal({ title: 'TIDAK TERBACA', message: 'Pastikan gambar QR Code jelas.', icon: '❌', confirmText: 'COBA LAGI' });
            }
        };

        function processResult(decodedText) {
            let id = decodedText;
            try {
                if (decodedText.startsWith("http")) {
                    const url = new URL(decodedText);
                    id = url.searchParams.get("id") || decodedText;
                }
            } catch (e) {}
            if (id) addDeviceToAccount(id.trim().toUpperCase());
        }

        async function addDeviceToAccount(deviceId) {
            if (!currentUser) return;
            showSipandiModal({ title: 'VALIDASI...', message: `Mengecek ID: ${deviceId}`, icon: '🔍', showLoading: true });
            try {
                const regSnap = await getDoc(doc(db, "registered_devices", deviceId));
                if (regSnap.exists()) {
                    if (regSnap.data().owner_uid !== currentUser.uid) {
                        showSipandiModal({ title: 'ALAT TERDAFTAR', message: 'Alat ini sudah dimiliki orang lain.', icon: '⚠️', confirmText: 'OK' });
                        return;
                    } else {
                        // JIKA SUDAH MILIK SENDIRI
                        showSipandiModal({ title: 'SUDAH ADA', message: 'Perangkat ini sudah ditambahkan di akun Anda.', icon: 'ℹ️', confirmText: 'BUKA BERANDA', onConfirm: () => window.location.href = "/" });
                        return;
                    }
                }

                const snapshot = await get(ref(rtdb, `devices/${deviceId}`));
                if (!snapshot.exists()) {
                    showSipandiModal({ title: 'ID SALAH', message: 'ID Alat tidak ditemukan.', icon: '❌', confirmText: 'CEK LAGI' });
                    return;
                }
                await setDoc(doc(db, "registered_devices", deviceId), { owner_uid: currentUser.uid, registered_at: serverTimestamp() });
                await setDoc(doc(db, `/users/${currentUser.uid}/devices`, deviceId), { name: "Alat Sawah", added_at: serverTimestamp(), status: "Aktif" });
                showSipandiModal({ title: 'BERHASIL!', message: 'Alat berhasil ditambahkan.', icon: '🎁', confirmText: 'BUKA BERANDA', onConfirm: () => window.location.href = "/" });
            } catch (err) {
                showSipandiModal({ title: 'ERROR', message: 'Kesalahan sistem.', icon: '⚠️', confirmText: 'OK' });
            }
        }
    </script>
</body>
</html>
