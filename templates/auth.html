<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - SIPANDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5ca904',
                        secondary: '#4d8e03',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; transition: background-color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(92, 169, 4, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden relative">
    
    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl translate-x-1/3 translate-y-1/3"></div>

    <div class="w-full max-w-md animate__animated animate__zoomIn relative z-10">
        <div class="glass p-8 rounded-[2.5rem] shadow-xl">
            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-primary/10 rounded-[2rem] mb-4 animate__animated animate__bounceInDown">
                    <span class="text-4xl text-primary">🌾</span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">SIPANDI</h1>
                <p class="text-primary font-bold mt-2 uppercase tracking-widest text-xs">Sistem Pemantauan Padi Terintegrasi</p>
            </div>

            <!-- Login / Signup Form -->
            <div id="auth-form" class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1" for="email">Email Pengguna</label>
                        <input id="email" type="email" placeholder="nama@email.com" 
                            class="w-full bg-white border border-slate-200 text-slate-900 px-5 py-4 rounded-2xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1" for="password">Kata Sandi</label>
                        <input id="password" type="password" placeholder="••••••••" 
                            class="w-full bg-white border border-slate-200 text-slate-900 px-5 py-4 rounded-2xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
                    </div>
                </div>

                <button id="btn-auth" class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                    MASUK SEKARANG
                </button>

                <!-- Tombol Google -->
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="px-4 text-[10px] text-slate-400 font-black uppercase tracking-tighter">Atau</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <button id="btn-google" class="w-full py-4 bg-white text-slate-900 font-bold rounded-2xl shadow-sm flex items-center justify-center gap-3 hover:bg-slate-50 transition-all border border-slate-200 active:scale-95">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                    GOOGLE
                </button>

                <div class="text-center pt-4">
                    <p class="text-slate-400 text-sm">
                        <span id="toggle-text">Belum punya akun?</span>
                        <button id="btn-toggle" class="text-primary font-bold hover:underline">Daftar Di Sini</button>
                    </p>
                </div>
            </div>
            
            <!-- Error Alert -->
            <div id="auth-error" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 text-red-500 text-sm rounded-2xl animate__animated animate__shakeX">
                Kesalahan: Silakan coba lagi.
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-[10px] font-bold tracking-widest mt-8 uppercase">SIPANDI v2.1 - Tana Toraja Edition</p>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d",
            storageBucket: "sipandi-3d71d.firebasestorage.app",
            messagingSenderId: "133803656199",
            appId: "1:133803656199:web:51e5759ffd02a102a796a2",
            measurementId: "G-Y5CFE0EZ29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const btnAuth = document.getElementById('btn-auth');
        const btnGoogle = document.getElementById('btn-google');
        const btnToggle = document.getElementById('btn-toggle');
        const toggleText = document.getElementById('toggle-text');
        const errorEl = document.getElementById('auth-error');

        let isLogin = true;

        btnToggle.addEventListener('click', () => {
            isLogin = !isLogin;
            btnAuth.innerText = isLogin ? "MASUK SEKARANG" : "DAFTAR AKUN BARU";
            toggleText.innerText = isLogin ? "Belum punya akun?" : "Sudah punya akun?";
            btnToggle.innerText = isLogin ? "Daftar Di Sini" : "Masuk Ke Sini";
        });

        btnGoogle.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "/devices";
            } catch (error) {
                console.error(error);
                errorEl.innerText = error.message;
                errorEl.classList.remove('hidden');
            }
        });

        btnAuth.addEventListener('click', async () => {
            errorEl.classList.add('hidden');
            const email = emailInput.value;
            const pass = passInput.value;
            if (!email || !pass) return;
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
                window.location.href = "/devices";
            } catch (error) {
                errorEl.innerText = error.message;
                errorEl.classList.remove('hidden');
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "/devices";
        });
    </script>
</body>
</html>
