<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipandi - Akses Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#5ca904', secondary: '#4d8e03' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top left, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .input-glass { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0, 0, 0, 0.05); }
        input:focus { border-color: #5ca904; box-shadow: 0 0 0 4px rgba(92, 169, 4, 0.1); }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">

    <div class="w-full max-w-md animate__animated animate__fadeIn">
        <div class="glass p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
            <!-- Dekorasi -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-secondary/5 rounded-full blur-3xl"></div>

            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-primary/10 rounded-3xl mb-4 animate__animated animate__bounceIn">
                    <span class="text-4xl">🌾</span>
                </div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase">Sipandi</h1>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-[0.3em] mt-1">Agricultre IoT Platform</p>
            </div>

            <div class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1" for="email">Alamat Email</label>
                        <input id="email" type="email" placeholder="nama@email.com" 
                            class="w-full bg-white border border-slate-200 text-slate-900 px-5 py-4 rounded-2xl transition-all outline-none">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2 ml-1">
                            <label class="text-xs font-black text-slate-500 uppercase tracking-widest" for="password">Kata Sandi</label>
                            <button id="btn-forgot" class="text-[10px] font-bold text-primary hover:underline uppercase tracking-wider">Lupa Password?</button>
                        </div>
                        <div class="relative">
                            <input id="password" type="password" placeholder="••••••••" 
                                class="w-full bg-white border border-slate-200 text-slate-900 px-5 py-4 pr-14 rounded-2xl transition-all outline-none">
                            <button id="btn-show-pass" class="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-primary transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path id="eye-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <button id="btn-auth" class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                    MASUK SEKARANG
                </button>

                <!-- Tombol Google -->
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="px-4 text-[10px] text-slate-400 font-black uppercase tracking-tighter">Atau</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <button id="btn-google" class="w-full py-4 bg-white text-slate-900 font-bold rounded-2xl shadow-sm flex items-center justify-center gap-3 hover:bg-slate-50 transition-all border border-slate-200 active:scale-95">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                    GOOGLE
                </button>

                <div class="text-center pt-4">
                    <p class="text-slate-400 text-sm">
                        <span id="toggle-text">Belum punya akun?</span>
                        <button id="btn-toggle" class="text-primary font-bold hover:underline">Daftar Di Sini</button>
                    </p>
                </div>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-[10px] font-bold tracking-widest mt-8 uppercase">SIPANDI</p>
    </div>

    <!-- Popup Error Modal -->
    <div id="error-popup" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate__animated animate__fadeIn">
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full animate__animated animate__bounceIn">
            <div class="text-center">
                <div id="error-icon" class="text-5xl mb-4">⚠️</div>
                <h3 id="error-title" class="text-xl font-black text-slate-900 mb-2 uppercase">Gagal</h3>
                <p id="error-message" class="text-slate-500 font-medium leading-relaxed mb-8">Pesan error akan muncul di sini.</p>
                <button onclick="closeError()" class="w-full py-4 bg-primary text-white font-black rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.05] active:scale-95 transition-all">
                    MENGERTI
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d",
            storageBucket: "sipandi-3d71d.firebasestorage.app",
            messagingSenderId: "133803656199",
            appId: "1:133803656199:web:51e5759ffd02a102a796a2",
            measurementId: "G-Y5CFE0EZ29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const btnAuth = document.getElementById('btn-auth');
        const btnGoogle = document.getElementById('btn-google');
        const btnToggle = document.getElementById('btn-toggle');
        const btnForgot = document.getElementById('btn-forgot');
        const btnShowPass = document.getElementById('btn-show-pass');
        const toggleText = document.getElementById('toggle-text');
        const errorPopup = document.getElementById('error-popup');
        const errorMessage = document.getElementById('error-message');
        const errorTitle = document.getElementById('error-title');
        const errorIcon = document.getElementById('error-icon');

        let isLogin = true;

        window.closeError = () => {
            errorPopup.classList.add('hidden');
        };

        function showModal(title, message, icon = '⚠️') {
            errorTitle.innerText = title;
            errorMessage.innerText = message;
            errorIcon.innerText = icon;
            errorPopup.classList.remove('hidden');
            errorPopup.classList.add('animate__fadeIn');
        }

        function translateError(code) {
            switch(code) {
                case 'auth/invalid-credential': return "Email atau kata sandi tidak sesuai.";
                case 'auth/user-not-found': return "Akun belum terdaftar.";
                case 'auth/wrong-password': return "Kata sandi salah.";
                case 'auth/email-already-in-use': return "Email sudah digunakan akun lain.";
                case 'auth/weak-password': return "Kata sandi minimal 6 karakter.";
                case 'auth/too-many-requests': return "Terlalu banyak mencoba. Silakan tunggu.";
                default: return "Gagal memproses data. Silakan coba lagi.";
            }
        }

        // Toggle Password Visibility
        btnShowPass.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            document.getElementById('eye-icon').setAttribute('d', isPass 
                ? "M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" 
                : "M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z");
        });

        // Forgot Password
        btnForgot.addEventListener('click', async () => {
            const email = emailInput.value;
            if(!email) {
                showModal('LUPA PASSWORD', 'Masukkan email Anda terlebih dahulu di kolom alamat email.');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showModal('EMAIL TERKIRIM', 'Tautan untuk mereset password telah dikirim ke email Anda. Periksa kotak masuk atau spam.', '📧');
            } catch (err) {
                showModal('GAGAL', translateError(err.code));
            }
        });

        // Authentication Handler
        const handleAuth = async () => {
            const email = emailInput.value;
            const password = passInput.value;

            if (!email || !password) {
                showModal('DATA KOSONG', 'Mohon isi email dan kata sandi Anda.');
                return;
            }

            try {
                if (isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    if (!user.emailVerified) {
                        showModal('BELUM VERIFIKASI', 'Silakan verifikasi email Anda terlebih dahulu. Cek email untuk tautan verifikasi.', '📧');
                        return;
                    }
                    window.location.href = "/";
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCredential.user);
                    showModal('DAFTAR BERHASIL', 'Akun berhasil dibuat. Silakan cek email Anda untuk memverifikasi akun sebelum login.', '🎉');
                    toggleState();
                }
            } catch (error) {
                showModal('GAGAL', translateError(error.code));
            }
        };

        const toggleState = () => {
            isLogin = !isLogin;
            btnAuth.innerText = isLogin ? 'MASUK SEKARANG' : 'DAFTAR SEKARANG';
            toggleText.innerText = isLogin ? 'Belum punya akun?' : 'Sudah punya akun?';
            btnToggle.innerText = isLogin ? 'Daftar Di Sini' : 'Masuk Di Sini';
            btnForgot.classList.toggle('hidden', !isLogin);
        };

        btnAuth.addEventListener('click', handleAuth);
        btnToggle.addEventListener('click', toggleState);
        btnGoogle.addEventListener('click', () => signInWithPopup(auth, provider).catch(err => showModal('Gagal', translateError(err.code))));

        onAuthStateChanged(auth, (user) => {
            if (user && user.emailVerified) window.location.href = "/";
        });

        // Navigation improvements
        emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passInput.focus(); });
        passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
    </script>
</body>
</html>
