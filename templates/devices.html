<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawah Saya - SIPANDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#5ca904', secondary: '#4d8e03' }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(92, 169, 4, 0.1);
        }
    </style>
</head>

<body class="min-h-screen text-slate-800 pb-32">

    <!-- Header Section -->
    <header
        class="p-6 border-b border-slate-200 flex justify-between items-center bg-white/70 backdrop-blur-md sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-black text-primary uppercase tracking-tight">SIPANDI</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Monitoring Sawah Pintar</p>
        </div>

        <div class="flex items-center gap-2">
            <button id="btn-logout"
                class="p-3 bg-slate-100 hover:bg-red-500/10 text-slate-500 hover:text-red-500 rounded-2xl transition-all font-bold text-xs uppercase tracking-widest">
                Keluar
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-8 mt-6">
        <!-- Hero Account -->
        <section class="animate__animated animate__fadeInDown">
            <h2 class="text-3xl font-black text-slate-900">Selamat Datang, <span id="user-name"
                    class="text-primary italic">Petani</span>!</h2>
            <p class="text-slate-500 mt-2 font-medium leading-relaxed">Kelola semua alat pantau sawah Anda di sini.</p>
        </section>

        <!-- Devices List -->
        <div id="devices-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Loader -->
            <div class="col-span-full py-24 text-center animate__animated animate__pulse animate__infinite">
                <span class="text-5xl text-primary opacity-30">🌾</span>
                <p class="mt-4 text-slate-400 font-bold tracking-[0.2em] uppercase text-[10px]">Mencari koneksi alat...
                </p>
            </div>
        </div>

        <!-- Empty State (Hidden) -->
        <div id="empty-state"
            class="hidden text-center py-20 bg-white rounded-[3rem] border border-dashed border-slate-200 animate__animated animate__fadeIn">
            <div class="text-6xl mb-4">🚜</div>
            <h3 class="text-xl font-bold text-slate-900">Belum ada alat terdaftar</h3>
            <p class="text-slate-500 mt-2">Daftarkan alat Sipandi Anda untuk mulai memantau.</p>
        </div>
    </main>

    <!-- Floating Action Button -->
    <div class="fixed bottom-10 left-0 right-0 flex justify-center z-50">
        <button onclick="window.location.href='/add-device'"
            class="group bg-primary p-5 pl-7 pr-9 rounded-[2.5rem] shadow-2xl shadow-primary/30 flex items-center space-x-3 transition-all hover:scale-110 active:scale-95 animate__animated animate__bounceIn">
            <div class="p-2 bg-white/20 rounded-full group-hover:rotate-90 transition-transform duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <span class="text-white font-black tracking-tight text-lg uppercase">Tambah Alat Baru</span>
        </button>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
         import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
         import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
         import { getFirestore, collection, query, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
         import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d",
            storageBucket: "sipandi-3d71d.firebasestorage.app",
            messagingSenderId: "133803656199",
            appId: "1:133803656199:web:51e5759ffd02a102a796a2",
            measurementId: "G-Y5CFE0EZ29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
 
        const container = document.getElementById('devices-container');
        const emptyState = document.getElementById('empty-state');
        const userNameEl = document.getElementById('user-name');
        const deviceStatusMap = {}; 
        const activeListeners = []; // Trash bin untuk memberhentikan listener lama
        let serverTimeOffset = 0; 
 
        // Sinkronisasi Waktu Server
        onValue(ref(rtdb, ".info/serverTimeOffset"), (snapshot) => {
            serverTimeOffset = snapshot.val() || 0;
            console.log("Kompensasi Waktu Server:", serverTimeOffset, "ms");
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/auth";
                return;
            }
            userNameEl.innerText = user.displayName || user.email.split('@')[0];

             try {
                 const q = query(collection(db, `/users/${user.uid}/devices`));
                 const querySnapshot = await getDocs(q);
                 
                 // STOP semua listener lama sebelum render yang baru
                 activeListeners.forEach(unsubscribe => unsubscribe());
                 activeListeners.length = 0;
                 
                 container.innerHTML = '';
                 if (querySnapshot.empty) {
                     emptyState.classList.remove('hidden');
                 } else {
                     emptyState.classList.add('hidden');
                     let delay = 0.1;
                     querySnapshot.forEach((doc) => {
                         addDeviceCard(doc.id, doc.data().name || "Unit Sipandi", delay);
                         delay += 0.15;
                     });
                 }
             } catch (err) {
                 console.error("Error fetching devices:", err);
                 container.innerHTML = `<div class="col-span-full py-10 text-center text-red-400 font-bold uppercase tracking-widest text-[10px]">⚠️ Koneksi Database Bermasalah</div>`;
             }
        });

        function addDeviceCard(id, name, delay) {
            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = `glass p-8 rounded-[3rem] shadow-sm cursor-pointer border-transparent hover:border-primary group transition-all animate__animated animate__backInUp`;
            card.style.animationDelay = `${delay}s`;
            card.onclick = () => window.location.href = `/dashboard/${id}`;
             card.innerHTML = `
                 <div class="flex justify-between items-start mb-6">
                     <div class="p-3 bg-primary/10 rounded-2xl text-2xl group-hover:rotate-12 transition-transform">🌾</div>
                     <div class="flex flex-col items-end gap-2">
                         <span id="status-${id}" class="px-3 py-1 bg-slate-100 text-slate-400 text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all">Mengecek...</span>
                         <button onclick="removeDevice(event, '${id}', '${name}')" class="p-2 text-red-400 bg-red-50 hover:bg-red-100 border border-red-100 rounded-xl transition-all shadow-sm">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                             </svg>
                         </button>
                     </div>
                 </div>
                 <h4 class="text-xl font-black text-slate-900 group-hover:text-primary transition-colors">${name}</h4>
                 <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-1">ID: ${id}</p>
                 <div class="mt-8 flex items-center text-primary font-black text-xs tracking-widest uppercase group-hover:translate-x-2 transition-transform">
                     Buka Monitoring 
                     <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M9 5l7 7-7 7" />
                     </svg>
                 </div>
             `;
            container.appendChild(card);

               // Listen to Liveness (Heartbeat) from RTDB
             const statusRef = ref(rtdb, `devices/${id}/last_seen`);
             const unsubscribe = onValue(statusRef, (snapshot) => {
                 if (snapshot.exists()) {
                     deviceStatusMap[id] = snapshot.val();
                     updateStatusUI(id);
                 } else {
                     deviceStatusMap[id] = 0;
                     updateStatusUI(id);
                 }
             });
             activeListeners.push(unsubscribe); // Simpan agar bisa dimatikan nanti
         }

         function updateStatusUI(id) {
             const statusEl = document.getElementById(`status-${id}`);
             if (!statusEl) return;

             const lastSeen = deviceStatusMap[id];
             
             if (!lastSeen) {
                 statusEl.innerText = "Offline";
                 statusEl.className = "px-3 py-1 bg-red-100 text-red-500 text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all";
                 return;
             }

             const now = Date.now() + serverTimeOffset;
             const diff = (now - lastSeen) / 1000;

             if (diff % 5 < 1) console.log(`[Status ${id}] Diff: ${diff.toFixed(1)}s`);

             if (diff >= 0 && diff < 30) { 
                 statusEl.innerText = "Aktif";
                 statusEl.className = "px-3 py-1 bg-primary/10 text-primary text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all";
             } else {
                 statusEl.innerText = "Offline";
                 statusEl.className = "px-3 py-1 bg-red-100 text-red-500 text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all";
             }
         }

         setInterval(() => {
             Object.keys(deviceStatusMap).forEach(id => updateStatusUI(id));
         }, 5000);

         window.removeDevice = async (event, id, name) => {
             event.stopPropagation();
             
             Swal.fire({
                 title: 'Hapus Perangkat?',
                 text: `Apakah Anda yakin ingin menghapus "${name}"?`,
                 icon: 'warning',
                 showCancelButton: true,
                 confirmButtonColor: '#5ca904',
                 cancelButtonColor: '#ef4444',
                 confirmButtonText: 'Ya, Hapus!',
                 cancelButtonText: 'Batal',
                 background: '#ffffff',
                 borderRadius: '2rem',
                 customClass: {
                     popup: 'rounded-[2rem] font-sans',
                     confirmButton: 'rounded-xl font-bold px-6 py-3',
                     cancelButton: 'rounded-xl font-bold px-6 py-3'
                 }
             }).then(async (result) => {
                 if (result.isConfirmed) {
                     try {
                         const user = auth.currentUser;
                         if (!user) return;

                         await deleteDoc(doc(db, `/users/${user.uid}/devices`, id));
                         
                         document.getElementById(`card-${id}`).classList.add('animate__fadeOutScale');
                         setTimeout(() => {
                             document.getElementById(`card-${id}`).remove();
                             if (container.children.length === 0) {
                                 emptyState.classList.remove('hidden');
                             }
                         }, 500);

                         Swal.fire({
                             title: 'Berhasil!',
                             text: 'Perangkat telah dihapus.',
                             icon: 'success',
                             timer: 1500,
                             showConfirmButton: false,
                             borderRadius: '2rem'
                         });
                     } catch (err) {
                         console.error("Gagal menghapus:", err);
                         Swal.fire('Error', 'Gagal menghapus perangkat.', 'error');
                     }
                 }
             });
         };

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
    </script>
</body>

</html>
