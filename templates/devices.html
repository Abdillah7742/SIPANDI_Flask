<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawah Saya - SIPANDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#5ca904', secondary: '#4d8e03' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(92, 169, 4, 0.1); }
        .btn-glass { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>

<body class="min-h-screen text-slate-800 pb-32">

    <!-- Header Section -->
    <header class="p-6 border-b border-slate-200 flex justify-between items-center bg-white/70 backdrop-blur-md sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-black text-primary uppercase tracking-tight">SIPANDI</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Monitoring Sawah Pintar</p>
        </div>

        <div class="flex items-center gap-2">
            <button id="btn-logout-trigger"
                class="p-4 bg-slate-100 hover:bg-red-500/10 text-slate-500 hover:text-red-500 rounded-2xl transition-all font-bold text-xs uppercase tracking-widest">
                Keluar
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-8 mt-6">
        <!-- Hero Account -->
        <section class="animate__animated animate__fadeInDown">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Selamat Datang, <span id="user-name" class="text-primary italic">Petani</span>!</h2>
            <p class="text-slate-500 mt-2 font-medium leading-relaxed opacity-70 uppercase text-[10px] tracking-widest">Panel Kendali Utama Anda</p>
        </section>

        <!-- Devices List -->
        <div id="devices-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
            <!-- Loader -->
            <div class="col-span-full py-24 text-center animate__animated animate__pulse animate__infinite">
                <span class="text-5xl text-primary opacity-30">🌾</span>
                <p class="mt-4 text-slate-400 font-bold tracking-[0.2em] uppercase text-[10px]">Mencari koneksi alat...</p>
            </div>
        </div>

        <!-- Empty State (Hidden) -->
        <div id="empty-state" class="hidden text-center py-20 glass rounded-[3rem] border-dashed border-slate-200 animate__animated animate__fadeIn">
            <div class="text-6xl mb-4">🚜</div>
            <h3 class="text-xl font-bold text-slate-900 uppercase">Belum ada alat</h3>
            <p class="text-slate-500 mt-2 text-sm">Daftarkan alat Sipandi Anda untuk mulai memantau.</p>
        </div>
    </main>

    <!-- Floating Action Button -->
    <div class="fixed bottom-10 left-0 right-0 flex justify-center z-40">
        <button onclick="window.location.href='/add-device'"
            class="group bg-primary p-6 pl-8 pr-10 rounded-[2.5rem] shadow-2xl shadow-primary/30 flex items-center space-x-4 transition-all hover:scale-110 active:scale-95 animate__animated animate__bounceIn">
            <div class="p-2 bg-white/20 rounded-full group-hover:rotate-90 transition-transform duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <span class="text-white font-black tracking-tight text-lg uppercase">Tambah Alat</span>
        </button>
    </div>

    <!-- CUSTOM PREMIUM MODAL (Glassmorphism) -->
    <div id="modal-container" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate__animated animate__fadeIn">
        <div class="glass p-10 rounded-[3rem] shadow-2xl max-w-sm w-full animate__animated animate__bounceIn">
            <div class="text-center">
                <div id="modal-icon" class="text-5xl mb-6">⚠️</div>
                <h3 id="modal-title" class="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tight">Konfirmasi</h3>
                <p id="modal-message" class="text-slate-500 font-medium leading-relaxed mb-10 text-sm">Apakah Anda yakin ingin melakukan tindakan ini?</p>
                
                <div id="modal-buttons" class="flex flex-col gap-3">
                    <!-- Buttons will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XxqrHpLMn7h9vFGwT2Zu7cxShGT1vOY",
            authDomain: "sipandi-3d71d.firebaseapp.com",
            databaseURL: "https://sipandi-3d71d-default-rtdb.firebaseio.com",
            projectId: "sipandi-3d71d",
            storageBucket: "sipandi-3d71d.firebasestorage.app",
            messagingSenderId: "133803656199",
            appId: "1:133803656199:web:51e5759ffd02a102a796a2",
            measurementId: "G-Y5CFE0EZ29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const container = document.getElementById('devices-container');
        const emptyState = document.getElementById('empty-state');
        const userNameEl = document.getElementById('user-name');
        const modalContainer = document.getElementById('modal-container');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalIcon = document.getElementById('modal-icon');
        const modalButtons = document.getElementById('modal-buttons');

        let deviceStatusMap = {};
        const activeListeners = [];
        let serverTimeOffset = 0;

        // Custom Modal Controller
        window.showSipandiModal = ({ title, message, icon, confirmText, cancelText, onConfirm }) => {
            modalTitle.innerText = title;
            modalMessage.innerText = message;
            modalIcon.innerText = icon || '⚠️';
            modalButtons.innerHTML = '';

            if (confirmText) {
                const btnConfirm = document.createElement('button');
                btnConfirm.className = "w-full py-5 bg-primary text-white font-black rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all text-xs tracking-widest uppercase";
                btnConfirm.innerText = confirmText;
                btnConfirm.onclick = () => {
                    closeSipandiModal();
                    if (onConfirm) onConfirm();
                };
                modalButtons.appendChild(btnConfirm);
            }

            if (cancelText) {
                const btnCancel = document.createElement('button');
                btnCancel.className = "w-full py-5 bg-slate-100 text-slate-500 font-black rounded-2xl hover:bg-slate-200 transition-all text-xs tracking-widest uppercase";
                btnCancel.innerText = cancelText;
                btnCancel.onclick = closeSipandiModal;
                modalButtons.appendChild(btnCancel);
            }

            modalContainer.classList.remove('hidden');
            modalContainer.classList.remove('animate__fadeOut');
            modalContainer.classList.add('animate__fadeIn');
        };

        window.closeSipandiModal = () => {
            modalContainer.classList.add('animate__fadeOut');
            setTimeout(() => modalContainer.classList.add('hidden'), 500);
        };

        // Logout Handler
        document.getElementById('btn-logout-trigger').addEventListener('click', () => {
            showSipandiModal({
                title: 'KELUAR AKUN',
                message: 'Apakah Anda yakin ingin keluar dari SIPANDI? Anda perlu masuk kembali untuk memantau sawah.',
                icon: '👋',
                confirmText: 'YA, KELUAR',
                cancelText: 'BATAL',
                onConfirm: () => signOut(auth)
            });
        });

        // Sync Time
        onValue(ref(rtdb, ".info/serverTimeOffset"), (snapshot) => {
            serverTimeOffset = snapshot.val() || 0;
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/auth";
                return;
            }
            userNameEl.innerText = user.displayName || user.email.split('@')[0];

            try {
                const q = query(collection(db, `/users/${user.uid}/devices`));
                const querySnapshot = await getDocs(q);
                
                activeListeners.forEach(unsubscribe => unsubscribe());
                activeListeners.length = 0;
                
                container.innerHTML = '';
                if (querySnapshot.empty) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    let delay = 0.1;
                    querySnapshot.forEach((doc) => {
                        addDeviceCard(doc.id, doc.data().name || "Unit Sipandi", delay);
                        delay += 0.15;
                    });
                }
            } catch (err) {
                showSipandiModal({ title: 'ERROR', message: 'Gagal mengambil data perangkat.', icon: '❌', confirmText: 'OK' });
            }
        });

        function addDeviceCard(id, name, delay) {
            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = "glass p-8 rounded-[3rem] shadow-sm cursor-pointer border-transparent hover:border-primary group transition-all animate__animated animate__backInUp";
            card.style.animationDelay = `${delay}s`;
            card.onclick = (e) => {
                if (!e.target.closest('button')) window.location.href = `/dashboard/${id}`;
            };
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div class="p-3 bg-primary/10 rounded-2xl text-2xl group-hover:rotate-12 transition-transform">🌾</div>
                    <div class="flex flex-col items-end gap-2">
                        <span id="status-${id}" class="px-3 py-1 bg-slate-100 text-slate-400 text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all">...</span>
                        <button id="del-${id}" class="p-2 text-red-400 bg-red-50 hover:bg-red-500 hover:text-white rounded-xl transition-all shadow-sm border border-red-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
                <h4 class="text-xl font-black text-slate-900 group-hover:text-primary transition-colors">${name}</h4>
                <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-1">ID: ${id}</p>
                <div class="mt-8 flex items-center text-primary font-black text-xs tracking-widest uppercase group-hover:translate-x-2 transition-transform">
                    Buka Monitoring 
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            `;
            container.appendChild(card);

            document.getElementById(`del-${id}`).onclick = (e) => {
                e.stopPropagation();
                removeDevice(id, name);
            };

            const unsubscribe = onValue(ref(rtdb, `devices/${id}/last_seen`), (snapshot) => {
                const lastSeen = snapshot.val() || 0;
                deviceStatusMap[id] = lastSeen;
                updateStatusUI(id);
            });
            activeListeners.push(unsubscribe);
        }

        function updateStatusUI(id) {
            const statusEl = document.getElementById(`status-${id}`);
            if (!statusEl) return;
            const lastSeen = deviceStatusMap[id];
            const now = Date.now() + serverTimeOffset;
            const diff = (now - lastSeen) / 1000;

            if (lastSeen > 0 && diff < 30) {
                statusEl.innerText = "ONLINE";
                statusEl.className = "px-3 py-1 bg-primary/10 text-primary text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all";
            } else {
                statusEl.innerText = "OFFLINE";
                statusEl.className = "px-3 py-1 bg-slate-100 text-slate-400 text-[10px] font-black tracking-[0.2em] rounded-full uppercase transition-all";
            }
        }

        async function removeDevice(id, name) {
            showSipandiModal({
                title: 'HAPUS ALAT',
                message: `Apakah Anda yakin ingin menghapus "${name}"? Perangkat ini akan tersedia bagi orang lain segera setelah dihapus.`,
                icon: '🗑️',
                confirmText: 'YA, HAPUS',
                cancelText: 'BATAL',
                onConfirm: async () => {
                    const user = auth.currentUser;
                    if (!user) return;
                    try {
                        await deleteDoc(doc(db, `/users/${user.uid}/devices`, id));
                        await deleteDoc(doc(db, "registered_devices", id));
                        
                        document.getElementById(`card-${id}`).classList.add('animate__fadeOutScale');
                        setTimeout(() => {
                            document.getElementById(`card-${id}`).remove();
                            if (container.children.length === 0) emptyState.classList.remove('hidden');
                        }, 500);
                    } catch (err) {
                        showSipandiModal({ title: 'ERROR', message: 'Gagal menghapus perangkat.', icon: '❌', confirmText: 'OK' });
                    }
                }
            });
        }

        setInterval(() => {
            Object.keys(deviceStatusMap).forEach(id => updateStatusUI(id));
        }, 5000);
    </script>
</body>
</html>
